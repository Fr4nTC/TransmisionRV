<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emisor VR - Cámara Principal</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        video { width: 90%; max-width: 600px; border-radius: 10px; margin-top: 20px; background: #000; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        #status { margin-top: 10px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>
    <h1>Emisor VR</h1>
    <button id="btnTransmitir">Transmitir Cámara Trasera</button>
    <p id="status">Listo...</p>
    <video id="localVideo" autoplay playsinline muted></video>

    <script>
        const peer = new Peer('dispositivo-emisor');
        const btnTransmitir = document.getElementById('btnTransmitir');
        const statusText = document.getElementById('status');

        btnTransmitir.addEventListener('click', () => {
            // Intentar bloquear en horizontal
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }

            // Cambiamos a 'environment' para la cámara principal
            const constraints = { 
                video: { 
                    facingMode: "environment", 
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }, 
                audio: false 
            };

            navigator.mediaDevices.getUserMedia(constraints)
            .then((stream) => {
                document.getElementById('localVideo').srcObject = stream;
                peer.call('redmi-vr-receptor', stream);
                statusText.innerText = "Transmitiendo cámara principal...";
            })
            .catch(err => {
                statusText.innerText = "Error al acceder a la cámara trasera.";
                console.error(err);
            });
        });
    </script>
</body>
</html>
