<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emisor Ultra Latencia</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        button { padding: 20px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer; }
        video { width: 60%; margin-top: 15px; border: 1px solid #444; }
    </style>
</head>
<body>
    <button id="btn">TRANSMITIR (MÍNIMA LATENCIA)</button>
    <p id="status">Listo</p>
    <video id="localVideo" autoplay playsinline muted></video>

    <script>
        // Configuración de servidores STUN para conexión directa P2P
        const peer = new Peer('dispositivo-emisor', {
            config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]}
        });

        document.getElementById('btn').addEventListener('click', () => {
            const constraints = { 
                video: { 
                    facingMode: "environment",
                    width: { ideal: 480 }, 
                    height: { ideal: 270 }, // Resolución mínima para fluidez máxima
                    frameRate: { ideal: 30 } 
                }, 
                audio: false 
            };

            navigator.mediaDevices.getUserMedia(constraints).then((stream) => {
                document.getElementById('localVideo').srcObject = stream;
                peer.call('redmi-vr-receptor', stream);
                document.getElementById('status').innerText = "En vivo - Latencia optimizada";
                document.getElementById('btn').style.display = 'none';
            });
        });
    </script>
</body>
</html>
