<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emisor VR - Horizontal</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        video { width: 80%; border: 2px solid #333; border-radius: 8px; background: #111; }
        button { padding: 20px 40px; font-size: 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 10px; font-weight: bold; }
        #status { margin-top: 15px; color: #00ff00; font-family: monospace; }
    </style>
</head>
<body>
    <button id="btnTransmitir">INICIAR EN HORIZONTAL</button>
    <p id="status">Esperando...</p>
    <video id="localVideo" autoplay playsinline muted></video>

    <script>
        const peer = new Peer('dispositivo-emisor');
        const btnTransmitir = document.getElementById('btnTransmitir');

        btnTransmitir.addEventListener('click', () => {
            // 1. Intentar bloquear la pantalla en horizontal (Landscape)
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(e => console.log("Gira el cel manualmente"));
            }

            // 2. Configurar resolución HORIZONTAL (Ancho > Alto)
            const constraints = { 
                video: { 
                    facingMode: "environment",
                    width: { min: 1280, ideal: 1920 }, // Forzamos formato panorámico
                    height: { min: 720, ideal: 1080 } 
                }, 
                audio: false 
            };

            navigator.mediaDevices.getUserMedia(constraints)
            .then((stream) => {
                const videoEl = document.getElementById('localVideo');
                videoEl.srcObject = stream;
                
                // Llamada al receptor de tu Redmi
                peer.call('redmi-vr-receptor', stream);
                document.getElementById('status').innerText = "TRANSMITIENDO EN HORIZONTAL";
                btnTransmitir.style.display = 'none';
            })
            .catch(err => {
                alert("Error: Asegúrate de girar el teléfono a horizontal antes de pulsar.");
                console.error(err);
            });
        });
    </script>
</body>
</html>
