<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Receptor Ultra Latencia</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <a-scene>
        <a-assets>
            <video id="remoteVideo" autoplay playsinline crossorigin="anonymous"></video>
        </a-assets>

        <!-- Video anclado a la cámara para HUD estático -->
        <a-entity camera look-controls="enabled: false">
            <a-video src="#remoteVideo" position="0 0 -1" width="2" height="1.12"></a-video>
        </a-entity>

        <a-sky color="#000000"></a-sky>
    </a-scene>

    <script>
        const peer = new Peer('redmi-vr-receptor', {
            config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]}
        });

        peer.on('call', (call) => {
            call.answer(); 
            call.on('stream', (stream) => {
                const video = document.getElementById('remoteVideo');
                video.srcObject = stream;
                video.play();
            });
        });
    </script>
</body>
</html>
