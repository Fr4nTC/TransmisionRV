<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor VR Estático - Receptor</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <!-- Desactivamos el movimiento de la cámara con look-controls: false -->
    <a-scene xr-mode-ui="enabled: true">
        <a-assets>
            <video id="remoteVideo" autoplay playsinline crossorigin="anonymous"></video>
        </a-assets>

        <!-- La cámara ahora contiene al video, así el video siempre está frente a los ojos -->
        <a-entity camera look-controls="enabled: false">
            <a-video src="#remoteVideo" 
                     position="0 0 -1" 
                     width="2" 
                     height="1.12">
            </a-video>
        </a-entity>

        <a-sky color="#000000"></a-sky>
    </a-scene>

    <script>
        const peer = new Peer('redmi-vr-receptor');

        peer.on('call', (call) => {
            call.answer(); 
            call.on('stream', (remoteStream) => {
                const video = document.getElementById('remoteVideo');
                video.srcObject = remoteStream;
                video.play();
            });
        });
    </script>
</body>
</html>
